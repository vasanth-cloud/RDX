<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDX AI Assistant</title>

    <style>
        :root {
            --bg: #f7f7f4;
            --panel: #ffffff;
            --soft: #eef4f2;
            --text: #1f2523;
            --muted: #66716d;
            --border: #d9dfdc;
            --accent: #0f766e;
            --accent-dark: #0b5f59;
            --sidebar: #16211f;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background: var(--bg);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .app {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            min-height: 100vh;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
            color: #f6fbf9;
            background: var(--sidebar);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 44px;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            color: #0f4f49;
            background: #d7efe9;
            font-weight: 800;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 750;
        }

        .brand-subtitle,
        .sidebar-note {
            color: #aab8b4;
            font-size: 13px;
            line-height: 1.45;
        }

        .new-chat {
            width: 100%;
            min-height: 42px;
            border: 1px solid #38504b;
            border-radius: 8px;
            color: #f6fbf9;
            background: #21312e;
            cursor: pointer;
            font: inherit;
            font-weight: 650;
        }

        .new-chat:hover {
            background: #2a3f3a;
        }

        .sidebar-note {
            margin-top: auto;
        }

        .main {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            min-width: 0;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 64px;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(247, 247, 244, 0.92);
            backdrop-filter: blur(10px);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 14px;
            white-space: nowrap;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #18a058;
        }

        .chat {
            overflow-y: auto;
            padding: 28px 24px 120px;
        }

        .messages {
            width: min(900px, 100%);
            margin: 0 auto;
        }

        .empty {
            display: grid;
            align-content: center;
            gap: 18px;
            min-height: calc(100vh - 230px);
            text-align: center;
        }

        .empty h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 46px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .empty p {
            width: min(620px, 100%);
            margin: 0 auto;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            width: min(720px, 100%);
            margin: 12px auto 0;
        }

        .suggestion {
            min-height: 56px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            background: var(--panel);
            cursor: pointer;
            font: inherit;
            text-align: left;
            line-height: 1.35;
        }

        .suggestion:hover {
            border-color: #9ab8b1;
            background: #fbfdfc;
        }

        .message {
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr);
            gap: 12px;
            padding: 18px 0;
        }

        .avatar {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
        }

        .avatar.user {
            color: #0f4f49;
            background: #e4f2ef;
        }

        .avatar.assistant {
            color: #f6fbf9;
            background: #243a36;
        }

        .bubble {
            width: fit-content;
            max-width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .message.user-message .bubble {
            margin-left: auto;
            background: #e4f2ef;
            border-color: #c4ded8;
        }

        .sources {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .source {
            padding: 5px 9px;
            border-radius: 999px;
            color: var(--muted);
            background: var(--soft);
            font-size: 12px;
        }

        .composer-wrap {
            position: fixed;
            right: 0;
            bottom: 0;
            left: 280px;
            padding: 18px 24px 22px;
            background: linear-gradient(180deg, rgba(247, 247, 244, 0), var(--bg) 28%);
        }

        .composer {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            align-items: end;
            gap: 10px;
            width: min(900px, 100%);
            margin: 0 auto;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 12px 34px rgba(22, 33, 31, 0.12);
        }

        textarea {
            width: 100%;
            max-height: 170px;
            min-height: 42px;
            padding: 10px 12px;
            border: 0;
            outline: 0;
            resize: none;
            color: var(--text);
            background: transparent;
            font: inherit;
            line-height: 1.45;
        }

        .button {
            display: grid;
            place-items: center;
            min-width: 42px;
            height: 42px;
            padding: 0 13px;
            border: 0;
            border-radius: 8px;
            color: var(--text);
            background: var(--soft);
            cursor: pointer;
            font: inherit;
            font-weight: 750;
        }

        .button:hover {
            background: #e4ece9;
        }

        .send {
            color: #ffffff;
            background: var(--accent);
        }

        .send:hover {
            background: var(--accent-dark);
        }

        .button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 780px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .topbar {
                padding: 12px 16px;
            }

            .chat {
                padding: 22px 16px 118px;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }

            .message {
                grid-template-columns: 32px minmax(0, 1fr);
                gap: 10px;
            }

            .avatar {
                width: 32px;
                height: 32px;
            }

            .composer-wrap {
                left: 0;
                padding: 14px 12px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">R</div>
                <div>
                    <div class="brand-title">RDX Assistant</div>
                    <div class="brand-subtitle">Document QA</div>
                </div>
            </div>

            <button class="new-chat" id="newChatButton">New chat</button>

            <div class="sidebar-note">
                Answers are generated from the uploaded machine documents and include sources when available.
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <strong>RDX AI Assistant</strong>
                <span class="status"><span class="status-dot"></span>Online</span>
            </header>

            <section class="chat" id="chat">
                <div class="messages" id="messages">
                    <div class="empty" id="emptyState">
                        <h1>What can I help with?</h1>
                        <p>Ask about machine operation, cleaning, print quality, maintenance, troubleshooting, or warranty information.</p>
                        <div class="suggestions">
                            <button class="suggestion">How often should the machine be cleaned?</button>
                            <button class="suggestion">What should I check before starting production?</button>
                            <button class="suggestion">Why are printheads not firing?</button>
                            <button class="suggestion">What causes carriage movement errors?</button>
                        </div>
                    </div>
                </div>
            </section>

            <div class="composer-wrap">
                <form class="composer" id="chatForm">
                    <textarea id="questionInput" rows="1" placeholder="Message RDX Assistant"></textarea>
                    <button class="button" type="button" id="voiceButton" title="Speak">Mic</button>
                    <button class="button send" type="submit" id="sendButton" title="Send">Send</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const messagesEl = document.getElementById("messages");
        const emptyState = document.getElementById("emptyState");
        const chatEl = document.getElementById("chat");
        const form = document.getElementById("chatForm");
        const input = document.getElementById("questionInput");
        const sendButton = document.getElementById("sendButton");
        const voiceButton = document.getElementById("voiceButton");
        const newChatButton = document.getElementById("newChatButton");
        const suggestionButtons = document.querySelectorAll(".suggestion");

        let sessionId = localStorage.getItem("rdx_session_id");
        let isSending = false;

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("rdx_session_id", sessionId);
        }

        function scrollToBottom() {
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        function resizeInput() {
            input.style.height = "auto";
            input.style.height = Math.min(input.scrollHeight, 170) + "px";
        }

        function hideEmptyState() {
            if (emptyState) {
                emptyState.remove();
            }
        }

        function addMessage(role, text) {
            hideEmptyState();

            const message = document.createElement("div");
            message.className = "message " + role + "-message";

            const avatar = document.createElement("div");
            avatar.className = "avatar " + role;
            avatar.textContent = role === "user" ? "You" : "AI";

            const content = document.createElement("div");
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;

            content.appendChild(bubble);
            message.appendChild(avatar);
            message.appendChild(content);
            messagesEl.appendChild(message);
            scrollToBottom();

            return { bubble, content };
        }

        function addSources(content, sources) {
            if (!sources || sources.length === 0) {
                return;
            }

            const sourcesEl = document.createElement("div");
            sourcesEl.className = "sources";

            sources.forEach((source) => {
                const item = document.createElement("span");
                item.className = "source";
                item.textContent = source;
                sourcesEl.appendChild(item);
            });

            content.appendChild(sourcesEl);
        }

        async function askQuestion(question) {
            if (!question || isSending) {
                return;
            }

            isSending = true;
            sendButton.disabled = true;
            voiceButton.disabled = true;

            addMessage("user", question);
            input.value = "";
            resizeInput();

            const assistant = addMessage("assistant", "Thinking...");

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        question,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (data.error) {
                    assistant.bubble.classList.add("error");
                    assistant.bubble.textContent = data.error;
                } else {
                    assistant.bubble.textContent = data.answer || "No answer returned.";
                    addSources(assistant.content, data.sources);
                }
            } catch (error) {
                assistant.bubble.classList.add("error");
                assistant.bubble.textContent = "Unable to reach the assistant. Please try again.";
            } finally {
                isSending = false;
                sendButton.disabled = false;
                voiceButton.disabled = false;
                input.focus();
                scrollToBottom();
            }
        }

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            askQuestion(input.value.trim());
        });

        input.addEventListener("input", resizeInput);

        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                form.requestSubmit();
            }
        });

        suggestionButtons.forEach((button) => {
            button.addEventListener("click", () => {
                askQuestion(button.textContent.trim());
            });
        });

        newChatButton.addEventListener("click", () => {
            localStorage.removeItem("rdx_session_id");
            window.location.reload();
        });

        voiceButton.addEventListener("click", () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert("Speech recognition is not supported in this browser.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = "en-US";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                input.value = transcript;
                resizeInput();
                askQuestion(transcript.trim());
            };

            recognition.start();
        });

        resizeInput();
    </script>
</body>

</html>
