<!DOCTYPE html>
<html>

<head>

    <title>RDX AI Assistant</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        .container {
            max-width: 800px;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            cursor: pointer;
        }

        #answer {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            min-height: 100px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>RDX AI Assistant</h1>

        <input
            type="text"
            id="question"
            placeholder="Ask your question..."
        >

        <button onclick="askQuestion()">
            Send
        </button>

        <button onclick="startListening()">
            🎤 Speak
        </button>

        <div id="answer"></div>

    </div>

    <script>

        // -------------------------
        // Session Memory
        // -------------------------

        let sessionId =
            localStorage.getItem(
                "session_id"
            );

        if (!sessionId) {

            sessionId =
                crypto.randomUUID();

            localStorage.setItem(
                "session_id",
                sessionId
            );
        }

        // -------------------------
        // Enter Key Support
        // -------------------------

        document
            .getElementById("question")
            .addEventListener(
                "keypress",
                function (event) {

                    if (
                        event.key === "Enter"
                    ) {
                        askQuestion();
                    }
                }
            );

        // -------------------------
        // Ask Question
        // -------------------------

        async function askQuestion() {

    const question =
        document.getElementById(
            "question"
        ).value.trim();

    if (!question) return;

    const answerDiv =
        document.getElementById(
            "answer"
        );

    answerDiv.innerHTML =
        "<b>Answer:</b><br><br>";

    const response =
        await fetch(
            "/ask-stream",
            {
                method: "POST",
                headers: {
                    "Content-Type":
                    "application/json"
                },
                body: JSON.stringify({
                    question: question,
                    session_id: sessionId
                })
            }
        );

    const reader =
        response.body.getReader();

    const decoder =
        new TextDecoder();

    let fullAnswer = "";

    while (true) {

        const {
            done,
            value
        } = await reader.read();

        if (done) break;

        const chunk =
            decoder.decode(value);

        fullAnswer += chunk;

        answerDiv.innerHTML =
            "<b>Answer:</b><br><br>" +
            fullAnswer;
    }

    speak(fullAnswer);
}

        // -------------------------
        // Voice Input
        // -------------------------

        function startListening() {

            const SpeechRecognition =
                window.SpeechRecognition ||
                window.webkitSpeechRecognition;

            if (!SpeechRecognition) {

                alert(
                    "Speech Recognition is not supported in this browser."
                );

                return;
            }

            const recognition =
                new SpeechRecognition();

            recognition.lang =
                "en-US";

            recognition.interimResults =
                false;

            recognition.maxAlternatives =
                1;

            recognition.start();

            recognition.onresult =
                function (event) {

                    const transcript =
                        event.results[0][0]
                            .transcript;

                    document.getElementById(
                        "question"
                    ).value =
                        transcript;

                    askQuestion();
                };

            recognition.onerror =
                function (event) {

                    console.error(
                        event.error
                    );
                };
        }

        // -------------------------
        // Voice Output
        // -------------------------

        function speak(text) {

            speechSynthesis.cancel();

            const speech =
                new SpeechSynthesisUtterance(
                    text
                );

            speech.lang =
                "en-US";

            speech.rate =
                1;

            speech.pitch =
                1;

            speechSynthesis.speak(
                speech
            );
        }

    </script>

</body>

</html>
